name: securemark
description: "A DCT-based image watermarking application using Google's Gemini API for analysis and embedding."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' 

# The following defines the version and build number for your application.
version: 1.0.0+1

environment:
  sdk: ^3.9.2

# Dependencies specify other packages that your package needs in order to work.
dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0        
  file_picker: ^11.0.2
  cupertino_icons: ^1.0.8
  file_saver: ^0.3.1
  gal: ^2.3.2
  google_generative_ai: ^0.4.7
  google_fonts: ^6.1.0  # For beautiful typography
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/splash_logo.png
    - .env
# ============================================================================
# FIXED: Custom Launcher Icons Configuration (Root level with correct spacing)
# ============================================================================
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 256